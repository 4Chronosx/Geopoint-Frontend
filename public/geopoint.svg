<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#050d1e"/>

  <!-- Globe circle -->
  <circle cx="30" cy="34" r="18" stroke="#00d4ff" stroke-width="1.8" fill="none" opacity="0.9"/>

  <!-- Latitude lines -->
  <ellipse cx="30" cy="34" rx="9" ry="18" stroke="#00d4ff" stroke-width="1.2" fill="none" opacity="0.45"/>
  <line x1="12" y1="34" x2="48" y2="34" stroke="#00d4ff" stroke-width="1.2" opacity="0.35"/>
  <line x1="14" y1="24" x2="46" y2="24" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <line x1="14" y1="44" x2="46" y2="44" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>

  <!-- Pin stem -->
  <line x1="38" y1="22" x2="32" y2="30" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Pin head outer glow -->
  <circle cx="41" cy="19" r="7" fill="#00d4ff" opacity="0.18"/>
  <!-- Pin head -->
  <circle cx="41" cy="19" r="5" fill="#00d4ff"/>
  <!-- Pin inner dot -->
  <circle cx="41" cy="19" r="2" fill="#050d1e"/>
</svg>
